version: "3.8"
services:
  barberapp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: barberapp-prod
    restart: always
    ports:
      - "80:3000"
    env_file:
      - .env.local.prod
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
