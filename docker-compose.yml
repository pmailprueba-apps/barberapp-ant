version: "3.8"
services:
  # Firebase Emulators: Firestore + Auth + Functions
  firebase-emulator:
    image: ghcr.io/firebase/firebase-emulator:latest
    container_name: barberapp-emulator
    ports:
      - "9090:9099"  # Auth Emulator UI
      - "5001:5001"  # Functions Emulator (REST API)
      - "8080:8080"  # Firestore Emulator
      - "4000:4000"  # Emulator Hub
      - "9000:9000"  # Pub/Sub
    environment:
      FIRESTORE_EMULATOR_HOST: "0.0.0.0:8080"
      FIREBASE_AUTH_EMULATOR_HOST: "0.0.0.0:9099"
      GOOGLE_APPLICATION_CREDENTIALS: "/app/service-account.json"
      PROJECT_ID: "barberapp-local"
    volumes:
      - ./emulator-data:/opt/firebase/emulator-data
      - ./service-account.json:/app/service-account.json:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Base dev environment
  node-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: barberapp-dev
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_FIREBASE_API_KEY: "fake-api-key"
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "localhost"
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: "barberapp-local"
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: "barberapp-local.appspot.com"
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "123456789"
      NEXT_PUBLIC_FIREBASE_APP_ID: "1:123456789:web:fake"
      FIREBASE_PROJECT_ID: "barberapp-local"
      FIREBASE_CLIENT_EMAIL: "dev@barberapp-local.iam.gserviceaccount.com"
      FIREBASE_PRIVATE_KEY: "-----BEGIN PRIVATE KEY-----\nMIIEvQIBADANBgkqhkiG9w0BAQEFAASCBKcwggSjAgEAAoIBAQC0\n-----END PRIVATE KEY-----\n"
    depends_on:
      - firebase-emulator
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev

volumes:
  emulator-data:
